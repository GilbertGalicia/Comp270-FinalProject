<html>
<head>
  <title>Manage Contacts</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .contact-item { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #2d313a; }
    .contact-info { text-align:left; }
    .contact-name { font-weight:bold; }
    .actions button { margin-left:5px; }

    #editModal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.7);
    }
    .modal-content {
      background:#1a1d24;
      padding:20px;
      border-radius:12px;
      max-width:400px;
      margin:100px auto;
    }
    .modal-content input {
      width:100%;
      margin:6px 0;
      padding:10px;
      border-radius:8px;
      border:1px solid #2d313a;
      background:#0f1115;
      color:white;
    }
     #editModal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100vw; height:100vh;
      background:rgba(0,0,0,0.7);
      z-index:1000;
    }
    .modal-content {
      position:relative;
      top:50%;
      transform:translateY(-50%);
    }
  </style>
</head>
<body>
<div class="container">

  <div class="card">
    <h3>EMERGENCY CONTACTS</h3>
    <div id="contactList"></div>
  </div>

  <button onclick="location.href='contacts.html'">Back</button>

</div>

<!-- MODAL -->
<div id="editModal">
  <div class="modal-content">
    <h3>Edit Contact</h3>
    <label>Name</label>
    <input id="editName" placeholder="Name">
    <label>Phone</label>
    <input id="editPhone" placeholder="Phone">
    <label>Email</label>
    <input id="editEmail" placeholder="Email">
    <label>Relationship</label>
    <input id="editRelation" placeholder="Relationship">
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()" style="background:#374151;">Cancel</button>
  </div>
</div>

<script>
let editIndex = null;

function loadContacts() {
  const list = document.getElementById('contactList');
  list.innerHTML = '';

  let contacts = JSON.parse(localStorage.getItem('contacts')) || [];

  contacts.forEach((c, index) => {
    const div = document.createElement('div');
    div.className = 'contact-item';

    div.innerHTML = `
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div><strong>Phone:</strong> ${c.phone}</div>
        <div><strong>Email:</strong> ${c.email || 'N/A'}</div>
        <div><strong>Relationship:</strong> ${c.relation || 'N/A'}</div>
      </div>
      <div class="actions">
        <button onclick="editContact(${index})">Edit</button>
        <button onclick="deleteContact(${index})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function deleteContact(index) {
  let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
  contacts.splice(index, 1);
  localStorage.setItem('contacts', JSON.stringify(contacts));
  loadContacts();
  }

function editContact(index) {
  let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
  const c = contacts[index];

  editIndex = index;

  document.getElementById('editName').value = c.name;
  document.getElementById('editPhone').value = c.phone;
  document.getElementById('editEmail').value = c.email || '';
  document.getElementById('editRelation').value = c.relation || '';

  document.getElementById('editModal').style.display = 'block';
}

function saveEdit() {
  let contacts = JSON.parse(localStorage.getItem('contacts')) || [];

  contacts[editIndex] = {
    name: document.getElementById('editName').value,
    phone: document.getElementById('editPhone').value,
    email: document.getElementById('editEmail').value,
    relation: document.getElementById('editRelation').value
  };

  localStorage.setItem('contacts', JSON.stringify(contacts));
  closeModal();
  loadContacts();
}

function closeModal() {
  document.getElementById('editModal').style.display = 'none';
}

loadContacts();
</script>

</body>
</html>
