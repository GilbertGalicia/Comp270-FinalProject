<html>
<head>
  <title>Main Menu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="card center">
    <h2>Main Menu</h2>
    <div class="grid" style="margin: 20px 0;">
      <button onclick="location.href='wifi.html'">Connect to WiFi</button>
      <button onclick="location.href='robot.html'">Pair Robot</button>
      <button onclick="location.href='contacts.html'">Emergency Contacts</button>
      <button id="managePermissionsBtn" onclick="location.href='permissions.html'">Manage Permissions</button>
      <button id="adminPanelBtn" style="display:none;" onclick="location.href='admin.html'">Admin Panel</button>
    </div>
    <button style="background:#ef4444; width:200px;" onclick="localStorage.removeItem('currentUser'); location.href='index.html'">Sign Out</button>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    
    if (!currentUser || currentUser.role !== "admin") {
      // Hide 'Manage Permissions' if the user is not an admin
      const manageBtn = document.getElementById("managePermissionsBtn");
      if (manageBtn) manageBtn.style.display = "none";
    } else {
      // Show 'Admin Panel' button if the user is an admin
      const adminBtn = document.getElementById("adminPanelBtn");
      if (adminBtn) adminBtn.style.display = "block";
    }
  });
</script>
</body>
</html>
