<html>
<head>
  <title>Emergency Contacts</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .contact-item { padding:10px; border-bottom:1px solid #2d313a; }
    .contact-name { font-weight:bold; }
  </style>
</head>
<body>
<div class="container">

  <div class="card center">
    <h2>Emergency Contacts</h2>
    <button onclick="location.href='create-contact.html'">Create Contact</button>
    <button onclick="location.href='manage-contacts.html'">Manage Contacts</button>

    <!-- CONTACT LIST INSIDE SAME DIV -->
    <div style="margin-top:20px; text-align:left;" id="contactList"></div>
  </div>

  
  </div>

  <button onclick="location.href='menu.html'">Back</button>

</div>
<script>
async function loadContacts() {
  const list = document.getElementById('contactList');
  list.innerHTML = '';

  let currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || !currentUser.UserID) {
    list.innerHTML = '<div>Please log in to view contacts.</div>';
    return;
  }

  try {
    const response = await fetch(`/api/contacts?userId=${currentUser.UserID}`);
    const contacts = await response.json();

    if (contacts.length === 0) {
      list.innerHTML = '<div>No contacts added yet.</div>';
      return;
    }

    contacts.forEach(c => {
      const div = document.createElement('div');
      div.className = 'contact-item';

      div.innerHTML = `
        <div class="contact-name">${c.Name}</div>
        <div><strong>Phone:</strong> ${c.PhoneNumber}</div>
        <div><strong>Email:</strong> ${c.Email || 'N/A'}</div>
        <div><strong>Relationship:</strong> ${c.Relationship || 'N/A'}</div>
      `;

      list.appendChild(div);
    });
  } catch (err) {
    console.error('Failed to load contacts:', err);
  }
}

loadContacts();
</script>

</body>
</html>
