<html>
<head>
  <title>Emergency Contacts</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .contact-item { padding:10px; border-bottom:1px solid #2d313a; }
    .contact-name { font-weight:bold; }
  </style>
</head>
<body>
<div class="container">

  <div class="card center">
    <h2>Emergency Contacts</h2>
    <button onclick="location.href='create-contact.html'">Create Contact</button>
    <button onclick="location.href='manage-contacts.html'">Manage Contacts</button>

    <!-- CONTACT LIST INSIDE SAME DIV -->
    <div style="margin-top:20px; text-align:left;" id="contactList"></div>
  </div>

  
  </div>

  <button onclick="location.href='menu.html'">Back</button>

</div>
<script>
function loadContacts() {
  const list = document.getElementById('contactList');
  list.innerHTML = '';

  let contacts = JSON.parse(localStorage.getItem('contacts')) || [];

  if (contacts.length === 0) {
    list.innerHTML = '<div>No contacts added yet.</div>';
    return;
  }

  contacts.forEach(c => {
    const div = document.createElement('div');
    div.className = 'contact-item';

    div.innerHTML = `
      <div class="contact-name">${c.name}</div>
      <div><strong>Phone:</strong> ${c.phone}</div>
      <div><strong>Email:</strong> ${c.email || 'N/A'}</div>
      <div><strong>Relationship:</strong> ${c.relation || 'N/A'}</div>
    `;

    list.appendChild(div);
  });
}

loadContacts();
</script>

</body>
</html>
