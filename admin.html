<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .dashboard { max-width: 1100px; margin:auto; }

    .section {
      background:#111318;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    h2 { color:#3b82f6; }

    .user-card {
      background:#0b0d10;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
      border:1px solid #2b2f36;
    }

    button {
      margin-top:8px;
      margin-right:8px;
      padding:6px 12px;
      border-radius:6px;
      border:none;
      cursor:pointer;
    }

    .edit-btn { background:#3b82f6; color:white; }
    .delete-btn { background:#ef4444; color:white; }
    .logout-btn { background:#374151; color:white; }
    .reset-btn { background:#f59e0b; color:black; }

    /* MODAL */
    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
    }

    .modal-content {
      background:#111318;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    .modal-content input, .modal-content select {
      width:100%;
      margin:8px 0;
      padding:8px;
      background:#0b0d10;
      border:1px solid #2b2f36;
      color:white;
    }

    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { padding:8px; border-top:1px solid #1f2937; text-align:left; }
  </style>
</head>

<body>

<div class="container dashboard">

  <!-- ================= USERS ================= -->
  <div class="section">
    <h2>User Management</h2>
    <div id="userList"></div>
  </div>

  <!-- ================= INCIDENTS ================= -->
  <div class="section">
    <h2>Monthly Emergency Incident Summary</h2>
    <p>Period: Jan 1 - 31, 2026</p>

    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px;">
      <div class="section"><h3>Total</h3><h2 id="totalIncidents">0</h2></div>
      <div class="section"><h3 style="color:#22c55e;">Resolved</h3><h2 id="resolvedIncidents">0</h2></div>
      <div class="section"><h3 style="color:#f59e0b;">Pending</h3><h2 id="pendingIncidents">0</h2></div>
    </div>

    <div style="margin-top:20px; overflow-x:auto;">
      <table>
        <thead>
          <tr style="color:#9ca3af;">
            <th>ID</th>
            <th>Date</th>
            <th>User</th>
            <th>Robot</th>
            <th>Alert</th>
            <th>Notified</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="incidentTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ================= SYSTEM ================= -->
  <div class="section">
    <h2>System Actions</h2>
    <h3>No Updates Needed</h3>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Edit User</h3>

    <input id="editPassword" placeholder="New Password">

    <select id="editRole">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>

    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
/* =========================
   ACCESS CONTROL
========================= */
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser || currentUser.role !== "admin") {
  window.location.href = "index.html";
}

let editIndex = null;

/* =========================
   USERS
========================= */
function loadUsers() {
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let container = document.getElementById("userList");

  container.innerHTML = "";

  users.forEach((u, i) => {
    container.innerHTML += `
      <div class="user-card">
        <p><b>Username:</b> ${u.account.username}</p>
        <p><b>Name:</b> ${u.personal.firstName} ${u.personal.lastName}</p>
        <p><b>Role:</b> ${u.role}</p>

        <button class="edit-btn" onclick="openEdit(${i})">Edit</button>
        <button class="delete-btn" onclick="deleteUser(${i})">Delete</button>
      </div>
    `;
  });
}

/* =========================
   EDIT USER
========================= */
function openEdit(i) {
  let users = JSON.parse(localStorage.getItem("users"));
  editIndex = i;

  document.getElementById("editPassword").value = users[i].account.password;
  document.getElementById("editRole").value = users[i].role;

  document.getElementById("editModal").style.display = "flex";
}

function saveEdit() {
  let users = JSON.parse(localStorage.getItem("users"));

  users[editIndex].account.password = document.getElementById("editPassword").value;
  users[editIndex].role = document.getElementById("editRole").value;

  localStorage.setItem("users", JSON.stringify(users));

  closeModal();
  loadUsers();
}

function closeModal() {
  document.getElementById("editModal").style.display = "none";
}

/* =========================
   DELETE USER
========================= */
function deleteUser(i) {
  let users = JSON.parse(localStorage.getItem("users"));

  if (users[i].role === "admin") {
    alert("Cannot delete admin");
    return;
  }

  users.splice(i, 1);
  localStorage.setItem("users", JSON.stringify(users));

  loadUsers();
}

/* =========================
   INCIDENTS
========================= */
function generateIncidents() {
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let names = users.map(u => u.account.username);

  if (names.length === 0) names = ["John", "Jane", "Alex"];

  let incidents = localStorage.getItem("incidents");

  if (!incidents) {
    let alerts = ["Fall detected","Distress vocalization","No movement (2h+)","Heart anomaly"];
    let robots = ["ROBO-1421","ROBO-1631","ROBO-1135","ROBO-1825"];

    incidents = [];

    for (let i = 1; i <= 6; i++) {
      incidents.push({
        id: "INC-13" + (20+i),
        date: `Jan ${Math.floor(Math.random()*28)+1}`,
        user: names[Math.floor(Math.random()*names.length)],
        robot: robots[Math.floor(Math.random()*robots.length)],
        alert: alerts[Math.floor(Math.random()*alerts.length)],
        notified: names[Math.floor(Math.random()*names.length)],
        status: Math.random() > 0.5 ? "Resolved" : "Pending"
      });
    }

    localStorage.setItem("incidents", JSON.stringify(incidents));
  }

  renderIncidents();
}

function renderIncidents() {
  let incidents = JSON.parse(localStorage.getItem("incidents")) || [];

  let table = document.getElementById("incidentTable");

  let total = incidents.length;
  let resolved = incidents.filter(i => i.status === "Resolved").length;
  let pending = incidents.filter(i => i.status === "Pending").length;

  document.getElementById("totalIncidents").innerText = total;
  document.getElementById("resolvedIncidents").innerText = resolved;
  document.getElementById("pendingIncidents").innerText = pending;

  table.innerHTML = "";

  incidents.forEach(i => {
    table.innerHTML += `
      <tr>
        <td>${i.id}</td>
        <td>${i.date}</td>
        <td>${i.user}</td>
        <td>${i.robot}</td>
        <td>${i.alert}</td>
        <td>${i.notified}</td>
        <td style="color:${i.status==="Resolved"?"#22c55e":"#f59e0b"}">${i.status}</td>
      </tr>
    `;
  });
}

/* =========================
   SYSTEM
========================= */
function resetSystem() {
  if (confirm("Reset all data?")) {
    localStorage.removeItem("users");
    localStorage.removeItem("incidents");
    localStorage.removeItem("currentUser");
    window.location.href = "index.html";
  }
}

function logout() {
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}

/* =========================
   INIT
========================= */
loadUsers();
generateIncidents();
</script>

</body>
</html>
