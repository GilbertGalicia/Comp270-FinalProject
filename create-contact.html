<html>
<head><title>Create Contact</title><link rel="stylesheet" href="styles.css"></head>
<body>
<div class="container">
  <div class="card">
    <h3>CREATE CONTACT</h3>
    <div class="grid">
      <input id="name" placeholder="Name">
      <input id="phone" placeholder="Phone">
      <input id="email" placeholder="Email">
      <input id="relation" placeholder="Relationship">
    </div>
    <button onclick="addContact()">Add Contact</button>
  </div>
  <button onclick="location.href='contacts.html'">Back</button>
</div>

<script>
function addContact() {
  const contact = {
    name: document.getElementById('name').value,
    phone: document.getElementById('phone').value,
    email: document.getElementById('email').value,
    relation: document.getElementById('relation').value
  };

  let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
  contacts.push(contact);
  localStorage.setItem('contacts', JSON.stringify(contacts));

  alert('Contact added');
  location.href = 'manage-contacts.html';
}

</script>
</body>
</html>
